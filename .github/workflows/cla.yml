name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# explicitly configure permissions, in case your GITHUB_TOKEN workflow permissions are set to read-only in repository settings
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: 'CLA Assistant'
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PERSONAL_ACCESS_TOKEN is required to store signatures in a separate repo.
          # Create a PAT with `repo` scope on an account with write access to the signatures repo,
          # then add it as a repository secret named PERSONAL_ACCESS_TOKEN.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/v1/cla.json'
          path-to-document: 'https://github.com/kanwas-ai/kanwas/blob/master/.github/CLA.md'
          branch: 'main'
          allowlist: dependabot[bot],renovate[bot]
          remote-organization-name: kanwas-ai
          remote-repository-name: cla-signatures
          custom-notsigned-prcomment: 'Thanks for your contribution to Kanwas! Before we can merge this PR, please read and sign our [Contributor License Agreement](https://github.com/kanwas-ai/kanwas/blob/master/.github/CLA.md).'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Thank you!'
          lock-pullrequest-aftermerge: false
